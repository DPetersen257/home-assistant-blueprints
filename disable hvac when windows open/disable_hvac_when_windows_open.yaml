blueprint:
  name: Disable HVAC When Windows Open
  description: Automatically turns off the climate device when any selected windows
    are open and restores it when all are closed.
  domain: automation
  input:
    climate_device:
      name: Climate Device
      description: Select the climate device you want to control.
      selector:
        entity:
          domain:
          - climate
          multiple: false
    window_sensors:
      name: Window Sensors
      description: Select the window sensors to monitor.
      selector:
        entity:
          domain:
          - binary_sensor
          multiple: true
    previous_state_helper:
      name: Previous State Helper
      description: Select the helper to store the climate device's previous state.
      selector:
        entity:
          domain:
          - input_text
          multiple: false
  source_url: https://raw.githubusercontent.com/DPetersen257/home-assistant-blueprints/main/disable%20hvac%20when%20windows%20open/disable_hvac_when_windows_open.yaml
trigger:
- platform: state
  entity_id: !input window_sensors
  to:
    - 'on'
    - 'off'
  from:
    - 'on'
    - 'off'
action:
  - variables:
      # FIX 1: Map the input to a list and check if ANY are 'on'
      sensors: !input window_sensors
      window_open: "{{ expand(sensors) | selectattr('state', 'eq', 'on') | list | count > 0 }}"
      climate_entity: !input climate_device
      state_helper: !input previous_state_helper
  
  - choose:
      # CASE: At least one window is open
      - conditions:
          - condition: template
            value_template: "{{ window_open }}"
        sequence:
          # FIX 2: Only save if HVAC isn't already off to prevent overwriting
          - if:
              - condition: template
                value_template: "{{ states(climate_entity) != 'off' }}"
            then:
              - service: input_text.set_value
                target:
                  entity_id: "{{ state_helper }}"
                data:
                  value: "{{ states(climate_entity) }}"
          - service: climate.turn_off
            target:
              entity_id: "{{ climate_entity }}"

      # CASE: All windows are closed (Default)
      default:
        # Only restore if the helper has a valid state and isn't 'off'
        - if:
            - condition: template
              value_template: "{{ states(state_helper) not in ['off', 'unknown', 'unavailable'] }}"
          then:
            - service: climate.set_hvac_mode
              target:
                entity_id: "{{ climate_entity }}"
              data:
                hvac_mode: "{{ states(state_helper) }}"
